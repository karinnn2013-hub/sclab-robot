<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scroll Timeline Test</title>

<style>

/* RESET */
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* SECTION */
.timeline-section {
  height: 250vh;
  position: relative;
}

/* STICKY */
.timeline-wrapper {
  position: sticky;
  top: 0;
  height: 100vh;
}

/* SVG */
.timeline-svg {
  width: 100%;
  height: 100%;
}

/* 背景曲线 */
#path-bg {
  fill: none;
  stroke: rgba(255,255,255,0.08);
  stroke-width: 1;
}

/* 发光曲线 */
#path-progress {
  fill: none;
  stroke: white;
  stroke-width: 1.2;

  stroke-dasharray: 2000;
  stroke-dashoffset: 2000;

  filter: drop-shadow(0 0 6px rgba(255,255,255,0.5));
}

/* 节点 */
.node {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);

  color: white;
  font-size: 14px;
  letter-spacing: 1px;

  opacity: 0.2;
  transition: all 0.6s ease;
}

/* 激活 */
.node.active {
  opacity: 1;
  transform: translate(-50%, -10px);
}

/* 小发光点 */
.node::before {
  content: '';
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  display: block;
  margin: 0 auto 8px;

  opacity: 0.3;
}

.node.active::before {
  opacity: 1;
  box-shadow: 0 0 10px white;
}

/* 位置（可以调） */
.node[data-index="0"] { top: 10%; }
.node[data-index="1"] { top: 35%; }
.node[data-index="2"] { top: 60%; }
.node[data-index="3"] { top: 85%; }

</style>
</head>

<body>

<section class="timeline-section">

  <div class="timeline-wrapper">

    <svg viewBox="0 0 600 1200" class="timeline-svg">

      <!-- 背景线 -->
      <path 
        id="path-bg"
        d="M300 0 
           C 500 150, 100 300, 300 450 
           S 500 750, 300 900 
           S 100 1100, 300 1200"
      />

      <!-- 动态线 -->
      <path 
        id="path-progress"
        d="M300 0 
           C 500 150, 100 300, 300 450 
           S 500 750, 300 900 
           S 100 1100, 300 1200"
      />

    </svg>

    <!-- 节点 -->
    <div class="node" data-index="0">Sensing</div>
    <div class="node" data-index="1">Processing</div>
    <div class="node" data-index="2">Diagnosis</div>
    <div class="node" data-index="3">Response</div>

  </div>

</section>

<script>

const section = document.querySelector(".timeline-section");
const path = document.getElementById("path-progress");
const nodes = document.querySelectorAll(".node");

const totalLength = path.getTotalLength();

// 初始化
path.style.strokeDasharray = totalLength;
path.style.strokeDashoffset = totalLength;

window.addEventListener("scroll", () => {

  const rect = section.getBoundingClientRect();
  const windowHeight = window.innerHeight;

  let progress = 1 - rect.top / (windowHeight * 1.5);
  progress = Math.max(0, Math.min(1, progress));

  // 曲线推进
  path.style.strokeDashoffset = totalLength * (1 - progress);

  // 节点出现
  nodes.forEach((node, i) => {
    const threshold = (i + 1) / (nodes.length + 1);

    if (progress > threshold) {
      node.classList.add("active");
    } else {
      node.classList.remove("active");
    }
  });

});

</script>

</body>
</html>
